(async () => {
  const bytes = Uint8Array.from(atob(WASM_B64), c => c.charCodeAt(0));
  const { instance } = await WebAssembly.instantiate(bytes, {});
  const ex = instance.exports;
  const mem = () => new Uint8Array(ex.memory.buffer);

  const status = document.getElementById("status");
  const out = document.getElementById("out");
  const src = document.getElementById("src");
  const run = document.getElementById("run");

  status.textContent = "ready";

  function evalSource(text) {
    const bytes = new TextEncoder().encode(text);
    mem().set(bytes, ex.input_ptr());
    const n = ex.eval_source(bytes.length);
    return new TextDecoder().decode(mem().subarray(ex.output_ptr(), ex.output_ptr() + n));
  }

  run.addEventListener("click", () => {
    try {
      const t0 = performance.now();
      const result = evalSource(src.value);
      const dt = (performance.now() - t0).toFixed(1);
      const gc = ex.gc_count ? ex.gc_count() : null;
      out.textContent = result;
      status.textContent = `${dt} ms` + (gc !== null ? ` · ${gc} gc cycles` : "");
    } catch (e) {
      out.textContent = String(e);
      status.textContent = "error";
    }
  });
})();
</script>
